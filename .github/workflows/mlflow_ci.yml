name: Telco Churn MLflow CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MLProject

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas numpy scikit-learn joblib cloudpickle

      - name: Clean old MLflow artifacts
        run: |
          rm -rf mlruns artifacts model_artifact

      - name: Run MLflow Project
        run: |
          python -m mlflow run . --env-manager=local

      - name: Upload MLflow runs
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-telco-churn
          path: MLProject/mlruns

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts-telco-churn
          path: MLProject/artifacts
